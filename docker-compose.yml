services:
  postgres:
    image: postgres:16-alpine
    container_name: reviewpilot-postgres
    environment:
      POSTGRES_DB: reviewpilot
      POSTGRES_USER: reviewpilot
      POSTGRES_PASSWORD: reviewpilot
    ports:
      - "5433:5432"
    volumes:
      - reviewpilot_postgres_data:/var/lib/postgresql/data

volumes:
  reviewpilot_postgres_data: